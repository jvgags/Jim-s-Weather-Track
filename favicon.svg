<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky background -->
  <circle cx="16" cy="16" r="16" fill="#EFF6FF"/>
  <!-- Sun -->
  <circle cx="16" cy="10" r="5" fill="#F59E0B"/>
  <!-- Sun rays -->
  <line x1="16" y1="3" x2="16" y2="5" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="21.5" y1="4.5" x2="20.2" y2="5.8" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="10" x2="21" y2="10" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <!-- Cloud -->
  <ellipse cx="14" cy="20" rx="7" ry="4.5" fill="#2563EB"/>
  <ellipse cx="10" cy="21" rx="4" ry="3.5" fill="#2563EB"/>
  <ellipse cx="19" cy="21" rx="4" ry="3" fill="#2563EB"/>
  <ellipse cx="14" cy="23" rx="8" ry="3.5" fill="#2563EB"/>
  <!-- Rain drops -->
  <line x1="10" y1="27" x2="9" y2="30" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="27" x2="13" y2="30" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="27" x2="17" y2="30" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
</svg>
